services:
  app:
    build:
      context: .
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
    networks:
      - front-tier
      - back-tier

  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: "${DB_USER}"
      PGUSER: "${DB_USER}"
      POSTGRES_PASSWORD: "${DB_PASSWORD}"
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - "db-data:/var/lib/postgresql/data"
    healthcheck:
      test: [ "CMD", "pg_isready" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - back-tier
  
  proxy:
    image: nginx:latest
    volumes:
      - type: bind
        source: ./configs/nginx/nginx.conf
        target: /etc/nginx/conf.d/default.conf
        read_only: true
    depends_on:
      - app
    ports: 
      - "${port}:80"
    expose:
      - "80"
    networks:
      - front-tier

networks:
  front-tier:
  back-tier:

volumes:
  db-data:
